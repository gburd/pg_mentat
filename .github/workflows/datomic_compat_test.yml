name: Datomic Compatibility Tests

on:
  push:
    branches: [main, claude, develop]
    paths:
      - 'mentatd/**'
      - 'pg_mentat/**'
      - '.github/workflows/datomic_compat_test.yml'
  pull_request:
    branches: [main, claude]
    paths:
      - 'mentatd/**'
      - 'pg_mentat/**'
      - '.github/workflows/datomic_compat_test.yml'
  workflow_dispatch:

jobs:
  datomic-compat:
    name: Datomic Client Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        pg-version: [15, 16]

    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: mentat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # -- Rust / mentatd build --

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mentatd/target
          key: cargo-mentatd-${{ runner.os }}-${{ hashFiles('mentatd/Cargo.lock') }}
          restore-keys: cargo-mentatd-${{ runner.os }}-

      - name: Install PostgreSQL dev headers (for pgrx)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-${{ matrix.pg-version }} libpq-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg${{ matrix.pg-version }}=/usr/lib/postgresql/${{ matrix.pg-version }}/bin/pg_config

      - name: Build and install pg_mentat extension
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: mentat_test
        run: |
          cd pg_mentat
          cargo pgrx install --pg-config=/usr/lib/postgresql/${{ matrix.pg-version }}/bin/pg_config --release
          # Activate the extension in the test database
          psql -c "CREATE EXTENSION IF NOT EXISTS pg_mentat;"

      - name: Build mentatd
        working-directory: mentatd
        run: cargo build --release

      - name: Create mentatd config
        working-directory: mentatd
        run: |
          cat > mentatd.toml <<'EOF'
          [server]
          host = "127.0.0.1"
          port = 8080

          [database]
          host = "localhost"
          port = 5432
          database = "mentat_test"
          user = "postgres"
          password = "postgres"
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' mentatd.toml

      - name: Start mentatd
        working-directory: mentatd
        env:
          RUST_LOG: info
        run: |
          ./target/release/mentatd > /tmp/mentatd.log 2>&1 &
          MENTATD_PID=$!
          echo "MENTATD_PID=$MENTATD_PID" >> "$GITHUB_ENV"
          # Wait for mentatd to be ready
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; then
              echo "mentatd is ready (PID $MENTATD_PID)"
              break
            fi
            echo "Waiting for mentatd... ($i/30)"
            sleep 2
          done
          curl -f http://127.0.0.1:8080/health || { echo "mentatd failed to start"; cat /tmp/mentatd.log; exit 1; }

      # -- Shell-based protocol tests --

      - name: Run shell protocol tests (EDN)
        timeout-minutes: 5
        working-directory: mentatd/tests/datomic_client
        env:
          MENTATD_URL: http://127.0.0.1:8080
        run: |
          chmod +x test_client.sh
          ./test_client.sh

      - name: Run shell protocol tests (Transit)
        timeout-minutes: 5
        working-directory: mentatd/tests/datomic_client
        env:
          MENTATD_URL: http://127.0.0.1:8080
        run: |
          chmod +x test_transit.sh
          ./test_transit.sh

      # -- Clojure / Leiningen tests --

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@master
        with:
          lein: 2.11.2

      - name: Cache Leiningen dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: lein-${{ runner.os }}-${{ hashFiles('mentatd/tests/datomic_client/project.clj') }}
          restore-keys: lein-${{ runner.os }}-

      - name: Run Clojure HTTP integration tests
        timeout-minutes: 10
        working-directory: mentatd/tests/datomic_client
        env:
          MENTATD_URI: "datomic:free://localhost:8080/test-db"
          MENTATD_URL: "http://127.0.0.1:8080"
        run: |
          # Run only HTTP-based tests (Transit wire + EDN integration).
          # The :peer tests require Datomic peer protocol support and are
          # not yet runnable against the HTTP REST API.
          lein test :http

      # -- Performance smoke test --

      - name: Run performance smoke test
        timeout-minutes: 3
        env:
          MENTATD_URL: http://127.0.0.1:8080
        run: |
          # Quick 30-second steady-state test to catch performance regressions.
          # Targets: >= 20 TPS, p99 < 200ms, 0% errors.
          # This is intentionally lenient for CI (real targets are higher).
          bash benchmarks/load_test.sh steady --port 8080 --duration 30 --concurrency 10 --verbose
          # Parse the JSON report to check thresholds
          REPORT=$(ls -t benchmarks/results/*/steady_report.json 2>/dev/null | head -1)
          if [ -n "$REPORT" ] && command -v jq &>/dev/null; then
            TPS=$(jq -r '.throughput_tps' "$REPORT")
            P99=$(jq -r '.p99_ms' "$REPORT")
            ERRORS=$(jq -r '.error_rate_pct' "$REPORT")
            echo "Performance: TPS=$TPS p99=${P99}ms errors=${ERRORS}%"
            echo "### Performance Smoke Test" >> "$GITHUB_STEP_SUMMARY"
            echo "| Metric | Value | Threshold |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|-----------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| TPS | $TPS | >= 20 |" >> "$GITHUB_STEP_SUMMARY"
            echo "| p99 Latency | ${P99}ms | < 200ms |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Error Rate | ${ERRORS}% | 0% |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Performance smoke test completed (no jq available for threshold check)"
          fi

      # -- Cleanup --

      - name: Stop mentatd
        if: always()
        run: kill "$MENTATD_PID" || true

      - name: Upload mentatd logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mentatd-logs-pg${{ matrix.pg-version }}
          path: /tmp/mentatd.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-pg${{ matrix.pg-version }}
          path: benchmarks/results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate test report
        if: always()
        run: |
          echo "## Datomic Compatibility Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date**: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PostgreSQL**: ${{ matrix.pg-version }}" >> "$GITHUB_STEP_SUMMARY"
