name: Security audit

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # master
        with:
          toolchain: stable
      - run: cargo install cargo-audit
      - name: cargo audit
        # Ignored advisories have no clean fix on the current dependency graph
        # (transitive via pgrx 0.17 / prometheus 0.13, or a major-version bump
        # away). Actively-patchable DoS advisories (RUSTSEC-2026-0178/0179/0180)
        # are fixed in Cargo.lock, not ignored.
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0437 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2021-0127 \
            --ignore RUSTSEC-2026-0002

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979  # v2.0.15

