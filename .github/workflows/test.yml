name: Test pg_mentat Extension

on:
  push:
    branches: [ main, claude, develop ]
  pull_request:
    branches: [ main, claude ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    name: Run pg_mentat Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PostgreSQL 16
        run: |
          # Add PostgreSQL APT repository
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update

          # Install PostgreSQL 16 and development files
          sudo apt-get install -y \
            postgresql-16 \
            postgresql-server-dev-16 \
            postgresql-client-16 \
            libpq-dev \
            pkg-config \
            libssl-dev \
            clang \
            llvm-dev \
            libclang-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install cargo-pgrx
        run: |
          cargo install --locked cargo-pgrx --version '~0.17'

      - name: Initialize pgrx
        run: |
          cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Run tests
        working-directory: pg_mentat
        run: |
          echo "::group::Building extension"
          cargo pgrx test pg16 --no-schema -- --test-threads=1 --nocapture
          echo "::endgroup::"
        env:
          RUST_BACKTRACE: 1

      - name: Generate test report
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for detailed test output." >> $GITHUB_STEP_SUMMARY

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs
          path: |
            pg_mentat/target/pgrx-test-data-*/
            pg_mentat/target/debug/deps/*.log
          retention-days: 7

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (if compilation possible)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

  build:
    name: Build Check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PostgreSQL 16
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-server-dev-16 libpq-dev pkg-config libssl-dev clang llvm-dev libclang-dev

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.90.0

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version '~0.17'

      - name: Initialize pgrx
        run: cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Build extension
        working-directory: pg_mentat
        run: cargo build --release

      - name: Check for warnings
        working-directory: pg_mentat
        run: |
          cargo build 2>&1 | tee build.log
          WARNINGS=$(grep "warning:" build.log | grep -v "Phase 2 stubs" | wc -l)
          echo "Found $WARNINGS unexpected warnings"
          if [ $WARNINGS -gt 2 ]; then
            echo "::error::Too many warnings ($WARNINGS > 2)"
            exit 1
          fi

  integration-check:
    name: Integration Tests Summary
    runs-on: ubuntu-22.04
    needs: [test, build]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## pg_mentat Test Suite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- EDN Types: 5 tests" >> $GITHUB_STEP_SUMMARY
          echo "- Query: 11 tests" >> $GITHUB_STEP_SUMMARY
          echo "- Time-Travel: 7 tests" >> $GITHUB_STEP_SUMMARY
          echo "- Rules: 8 tests" >> $GITHUB_STEP_SUMMARY
          echo "- Full-Text Search: 7 tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Total: 38 tests**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. See test job for details." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build succeeded!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed. See build job for details." >> $GITHUB_STEP_SUMMARY
          fi
