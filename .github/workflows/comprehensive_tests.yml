name: Comprehensive Test Suite
on:
  push:
    branches: [main, claude]
  pull_request:
    branches: [main, claude]
  schedule:
    # Run full suite nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # Unit Tests (fast, no DB required for some)
  # ==========================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Run mentatd unit tests (no DB needed for parser, serializer, config)
      - name: Run mentatd unit tests
        run: cargo test -p mentatd --lib -- --test-threads=4
        timeout-minutes: 10

      # Run pg_mentat pure unit tests (error module, etc.)
      - name: Run pg_mentat unit tests
        run: cargo test -p pg_mentat --lib -- --test-threads=4
        timeout-minutes: 10

  # ==========================================================================
  # pg_mentat Integration Tests (requires PostgreSQL via pgrx)
  # ==========================================================================
  pgrx-tests:
    name: pgrx Integration Tests (PG${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: [15, 16, 17]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install pgrx
        run: cargo install cargo-pgrx --locked
        timeout-minutes: 15

      - name: Initialize pgrx
        run: cargo pgrx init --pg${{ matrix.pg_version }} download
        timeout-minutes: 10

      - name: Run pg_mentat tests
        run: cargo pgrx test pg${{ matrix.pg_version }}
        timeout-minutes: 30

  # ==========================================================================
  # mentatd Integration Tests (requires PostgreSQL)
  # ==========================================================================
  mentatd-integration:
    name: mentatd Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: mentat
          POSTGRES_PASSWORD: mentat
          POSTGRES_DB: mentat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run mentatd integration tests
        run: cargo test -p mentatd --test '*'
        timeout-minutes: 15
        env:
          DATABASE_URL: postgresql://mentat:mentat@localhost/mentat_test

  # ==========================================================================
  # Parser Tests (standalone)
  # ==========================================================================
  parser-tests:
    name: Protocol Parser Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run parser tests
        run: cargo test -p mentatd --test parser_tests
        timeout-minutes: 10

  # ==========================================================================
  # Clippy Linting
  # ==========================================================================
  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Clippy check
        run: cargo clippy --all-targets -- -D warnings
        timeout-minutes: 15

  # ==========================================================================
  # Stress Tests (nightly only)
  # ==========================================================================
  stress-tests:
    name: Stress Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: mentat
          POSTGRES_PASSWORD: mentat
          POSTGRES_DB: mentat_stress
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install pgrx
        run: cargo install cargo-pgrx --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg16 download

      - name: Run stress tests
        run: |
          if [ -x benchmarks/stress_tests/run_stress.sh ]; then
            benchmarks/stress_tests/run_stress.sh
          else
            echo "Stress test runner not found, skipping"
          fi
        timeout-minutes: 60
        env:
          DATABASE_URL: postgresql://mentat:mentat@localhost/mentat_stress

  # ==========================================================================
  # Datomic Compatibility Tests
  # ==========================================================================
  datomic-compat:
    name: Datomic Compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: mentat
          POSTGRES_PASSWORD: mentat
          POSTGRES_DB: mentat_compat
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          lein: latest

      - name: Run Clojure client tests
        working-directory: mentatd/tests/datomic_client
        run: lein test
        timeout-minutes: 20
        env:
          DATABASE_URL: postgresql://mentat:mentat@localhost/mentat_compat
          MENTATD_URL: http://localhost:8080

  # ==========================================================================
  # Test Summary
  # ==========================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, pgrx-tests, mentatd-integration, parser-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |"
          echo "| pgrx Tests | ${{ needs.pgrx-tests.result }} |"
          echo "| mentatd Integration | ${{ needs.mentatd-integration.result }} |"
          echo "| Parser Tests | ${{ needs.parser-tests.result }} |"

          if [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.pgrx-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.mentatd-integration.result }}" == "failure" ]] || \
             [[ "${{ needs.parser-tests.result }}" == "failure" ]]; then
            echo ""
            echo "One or more test jobs failed!"
            exit 1
          fi
