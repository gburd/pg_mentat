on: [push, pull_request]

name: mentatd Tests

jobs:
  test:
    name: Test mentatd
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg-version: [14, 15, 16]
        rust-version: [stable, '1.92']
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: mentat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # master
        with:
          toolchain: ${{ matrix.rust-version }}

      - name: Run cargo test
        working-directory: mentatd
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/mentat_test
        run: cargo test

      - name: Run cargo build
        working-directory: mentatd
        run: cargo build --release

  integration:
    name: Integration test mentatd
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg-version: [14, 15, 16]
    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: mentat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # master
        with:
          toolchain: stable

      - name: Build mentatd
        working-directory: mentatd
        run: cargo build --release

      - name: Create test config
        working-directory: mentatd
        run: |
          cat > mentatd.toml <<EOF
          [server]
          host = "127.0.0.1"
          port = 8080

          [database]
          host = "localhost"
          port = 5432
          database = "mentat_test"
          user = "postgres"
          password = "postgres"
          EOF

      - name: Start mentatd in background
        working-directory: mentatd
        env:
          RUST_LOG: info
        run: |
          ./target/release/mentatd &
          MENTATD_PID=$!
          echo "MENTATD_PID=$MENTATD_PID" >> $GITHUB_ENV
          sleep 5

      - name: Test HTTP endpoint
        run: |
          curl -f http://127.0.0.1:8080/health || exit 1

      - name: Stop mentatd
        if: always()
        run: kill $MENTATD_PID || true

  lint:
    name: Lint mentatd
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9  # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run cargo fmt
        working-directory: mentatd
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        working-directory: mentatd
        run: cargo clippy --all-targets --all-features -- -D warnings
