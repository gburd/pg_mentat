apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mentatd
  namespace: pg-mentat
  labels:
    app.kubernetes.io/name: mentatd
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: pg-mentat
  annotations:
    # Adjust these annotations for your ingress controller (nginx, traefik, etc.)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: mentatd.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mentatd
                port:
                  name: http
  # Uncomment to enable TLS
  # tls:
  #   - hosts:
  #       - mentatd.example.com
  #     secretName: mentatd-tls
