apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mentatd
  namespace: pg-mentat
  labels:
    app.kubernetes.io/name: mentatd
    app.kubernetes.io/component: server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mentatd
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # Allow connections to PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pg-mentat-postgres
              app.kubernetes.io/component: database
      ports:
        - port: 5432
          protocol: TCP
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pg-mentat-postgres
  namespace: pg-mentat
  labels:
    app.kubernetes.io/name: pg-mentat-postgres
    app.kubernetes.io/component: database
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pg-mentat-postgres
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow connections from mentatd pods
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mentatd
              app.kubernetes.io/component: server
      ports:
        - port: 5432
          protocol: TCP
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
