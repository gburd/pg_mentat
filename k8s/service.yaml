apiVersion: v1
kind: Service
metadata:
  name: mentatd
  namespace: pg-mentat
  labels:
    app.kubernetes.io/name: mentatd
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: pg-mentat
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mentatd
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
# Headless service for PostgreSQL StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: pg-mentat-postgres
  namespace: pg-mentat
  labels:
    app.kubernetes.io/name: pg-mentat-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: pg-mentat
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: pg-mentat-postgres
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
