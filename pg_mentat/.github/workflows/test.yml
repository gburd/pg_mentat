name: Test pg_mentat

on:
  push:
    branches: [claude, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test PostgreSQL Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-16 \
            postgresql-server-dev-16 \
            libclang-dev \
            llvm-dev

      - name: Install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - name: Initialize pgrx
        run: cargo pgrx init --pg16=/usr/lib/postgresql/16/bin/pg_config

      - name: Run tests
        working-directory: pg_mentat
        run: |
          cargo pgrx test pg16 --no-schema 2>&1 | tee test_results.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pg_mentat/test_results.log
          retention-days: 30
