# Default values for pg-mentat Helm chart

# -- mentatd HTTP server configuration
mentatd:
  # -- Number of mentatd replicas
  replicaCount: 2

  image:
    # -- mentatd container image repository
    repository: pg-mentat/mentatd
    # -- Image pull policy
    pullPolicy: IfNotPresent
    # -- Image tag (defaults to Chart appVersion)
    tag: ""

  # -- Image pull secrets
  imagePullSecrets: []

  serviceAccount:
    # -- Create a service account
    create: true
    # -- Service account name (auto-generated if empty)
    name: ""

  # -- Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # -- Container-level security context
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

  # -- Server configuration
  config:
    host: "0.0.0.0"
    port: 8080
    timeout: 30
    logLevel: info
    logFormat: json

  # -- Query cache configuration
  cache:
    enabled: true
    capacity: 5000
    ttlSecs: 300

  # -- Database connection pool configuration
  pool:
    size: 20
    maxLifetimeSecs: 1800

  # -- Liveness probe configuration
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Readiness probe configuration
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Startup probe configuration
  startupProbe:
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 10

  # -- Additional environment variables
  extraEnv: []

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}

# -- Service configuration
service:
  type: ClusterIP
  port: 8080

# -- Ingress configuration
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: mentatd.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# -- Horizontal Pod Autoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -- Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- Network policies
networkPolicy:
  enabled: false

# -- PostgreSQL configuration
postgresql:
  # -- Enable the bundled PostgreSQL StatefulSet
  enabled: true

  image:
    # -- PostgreSQL image repository
    repository: postgres
    # -- PostgreSQL image tag
    tag: "16-bookworm"
    pullPolicy: IfNotPresent

  # -- pg_mentat extension image (used in init container)
  extensionImage:
    repository: pg-mentat/pg-mentat
    tag: ""
    pullPolicy: IfNotPresent

  auth:
    # -- PostgreSQL username
    username: mentat
    # -- PostgreSQL password (use existingSecret in production)
    password: mentat
    # -- PostgreSQL database name
    database: mentat
    # -- Use an existing secret for credentials
    existingSecret: ""

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # -- Persistent storage configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  # -- PostgreSQL configuration parameters
  config: {}
