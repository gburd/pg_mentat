apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg-mentat.fullname" . }}-config
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
data:
  mentatd.toml: |
    [server]
    host = {{ .Values.mentatd.config.host | quote }}
    port = {{ .Values.mentatd.config.port }}
    timeout = {{ .Values.mentatd.config.timeout }}

    [database]
    connection_string = {{ include "pg-mentat.postgresql.connectionString" . | quote }}
    pool_size = {{ .Values.mentatd.pool.size }}
    max_lifetime_secs = {{ .Values.mentatd.pool.maxLifetimeSecs }}

    [logging]
    level = {{ .Values.mentatd.config.logLevel | quote }}
    format = {{ .Values.mentatd.config.logFormat | quote }}

    [cache]
    enabled = {{ .Values.mentatd.cache.enabled }}
    capacity = {{ .Values.mentatd.cache.capacity }}
    ttl_secs = {{ .Values.mentatd.cache.ttlSecs }}
