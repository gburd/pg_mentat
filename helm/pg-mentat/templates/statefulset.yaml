{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pg-mentat.postgresql.fullname" . }}
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "pg-mentat.postgresql.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "pg-mentat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "pg-mentat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: install-extension
          image: {{ include "pg-mentat.extension.image" . }}
          imagePullPolicy: {{ .Values.postgresql.extensionImage.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp /usr/lib/postgresql/16/lib/pg_mentat.so /ext-lib/
              cp /usr/share/postgresql/16/extension/pg_mentat.control /ext-share/
              cp /usr/share/postgresql/16/extension/pg_mentat--*.sql /ext-share/
          volumeMounts:
            - name: ext-lib
              mountPath: /ext-lib
            - name: ext-share
              mountPath: /ext-share
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg-mentat.postgresql.secretName" . }}
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg-mentat.postgresql.secretName" . }}
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg-mentat.postgresql.secretName" . }}
                  key: postgres-db
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: ext-lib
              mountPath: /usr/lib/postgresql/16/lib/pg_mentat.so
              subPath: pg_mentat.so
              readOnly: true
            - name: ext-share
              mountPath: /usr/share/postgresql/16/extension/
              readOnly: true
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.auth.username }}
                - -d
                - {{ .Values.postgresql.auth.database }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.auth.username }}
                - -d
                - {{ .Values.postgresql.auth.database }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: ext-lib
          emptyDir: {}
        - name: ext-share
          emptyDir: {}
        - name: init-scripts
          configMap:
            name: {{ include "pg-mentat.postgresql.fullname" . }}-init
  {{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "pg-mentat.labels" . | nindent 10 }}
          app.kubernetes.io/component: database
      spec:
        accessModes:
          {{- toYaml .Values.postgresql.persistence.accessModes | nindent 10 }}
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
  {{- end }}
---
# Headless service for PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pg-mentat.postgresql.fullname" . }}
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "pg-mentat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
# Init script ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg-mentat.postgresql.fullname" . }}-init
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
data:
  01-create-extension.sql: |
    CREATE EXTENSION IF NOT EXISTS pg_mentat;
{{- end }}
