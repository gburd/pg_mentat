apiVersion: v1
kind: Service
metadata:
  name: {{ include "pg-mentat.fullname" . }}
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pg-mentat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
