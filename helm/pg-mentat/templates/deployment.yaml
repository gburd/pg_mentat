apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pg-mentat.fullname" . }}
  labels:
    {{- include "pg-mentat.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.mentatd.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pg-mentat.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "pg-mentat.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.mentatd.config.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "pg-mentat.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.mentatd.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: mentatd
          image: {{ include "pg-mentat.mentatd.image" . }}
          imagePullPolicy: {{ .Values.mentatd.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.mentatd.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.mentatd.config.port }}
              protocol: TCP
          env:
            - name: MENTATD_CONFIG
              value: /etc/mentatd/mentatd.toml
            - name: RUST_LOG
              value: {{ .Values.mentatd.config.logLevel }}
            {{- with .Values.mentatd.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/mentatd
              readOnly: true
          resources:
            {{- toYaml .Values.mentatd.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.mentatd.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mentatd.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mentatd.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mentatd.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.mentatd.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mentatd.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.mentatd.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.mentatd.readinessProbe.failureThreshold }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.mentatd.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mentatd.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.mentatd.startupProbe.failureThreshold }}
      {{- with .Values.mentatd.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mentatd.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mentatd.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mentatd.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pg-mentat.fullname" . }}-config
